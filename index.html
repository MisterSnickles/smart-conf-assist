<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Conference Assistant</title>
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Smart Conference Assistant</h1>
        <p>Ask questions about research papers and get AI-powered answers.</p>
    </div>

    <div class="card">
        <h2>Search Papers</h2>

        <div class="search-row">
            <input type="text" id="queryInput" placeholder="Ask anything about conference papers...">

            <select id="yearSelect">
                <option value="">All Years</option>
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
            </select>

            <button id="searchButton" onclick="performSearch()">Search</button>
        </div>
    </div>

    <div class="card">
        <h2>AI Response</h2>
        <div id="responseBox">Your results will appear here.</div>
    </div>

</div>

<script>
document.getElementById("queryInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        performSearch();
    }
});

async function performSearch() {
    const queryInput = document.getElementById('queryInput');
    const yearSelect = document.getElementById('yearSelect');
    const responseBox = document.getElementById('responseBox');
    const searchButton = document.getElementById('searchButton');

    const query = queryInput.value.trim();
    const year = yearSelect.value;

    if (!query) {
        responseBox.innerHTML = '<span class="error">Please enter a question.</span>';
        return;
    }

    searchButton.disabled = true;
    searchButton.textContent = "Searching...";

    responseBox.innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
            <span>Searching papers...</span>
        </div>
    `;

    try {
        const response = await fetch('/api/search', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ query: query, year: year })
        });

        const result = await response.json();

        if (response.ok) {
            responseBox.innerHTML = `<div class="fade-in">${result.response || "No response found."}</div>`;
        } else {
            responseBox.innerHTML = `<span class="error">Error:</span> ${result.detail || 'Unknown error'}`;
        }

    } catch (error) {
        responseBox.innerHTML = '<span class="error">Connection error. Backend might not be running.</span>';
    }

    searchButton.disabled = false;
    searchButton.textContent = "Search";
}
</script>

</body>
</html>
