<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Conference Assistant</title>
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Smart Conference Assistant</h1>
        <p>Ask questions about research papers and get AI-powered answers. This is a project for the SE4283 Class at UCO.</p>
    </div>

    <div class="card">
        <h2>Live Fetch from ArXiv API</h2>
        <div class="search-row">
            <input type="text" id="arxivTopic" placeholder="E.g., quantum computing, large language models...">
            <select id="arxivCount">
                <option value="5">Fetch 5</option>
                <option value="10">Fetch 10</option>
                <option value="20">Fetch 20</option>
            </select>
            <button id="fetchButton" onclick="performArxivFetch()">Fetch & Learn</button>
        </div>
        <div id="fetchStatus" style="margin-top: 10px; font-size: 0.9em; color: #555;"></div>
    </div>

    <div class="card">
        <h2>Search Papers</h2>

        <div class="search-row">
            <input type="text" id="queryInput" placeholder="Ask anything about conference papers...">

            <select id="yearSelect">
                <option value="">All Years</option>
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
            </select>
            <select id="modelSelect">
                <option value="mistral">Mistral</option>
            </select>

            <button id="searchButton" onclick="performSearch()">Search</button>
        </div>
    </div>

    <div class="card">
        <h2>AI Response</h2>
        <div id="responseBox">Your results will appear here.</div>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    try {
        const response = await fetch('/api/models');
        const data = await response.json();
        
        if (data.models && data.models.length > 0) {
            const modelSelect = document.getElementById('modelSelect');
            modelSelect.innerHTML = ''; // Clear default
            
            data.models.forEach(modelName => {
                const option = document.createElement('option');
                option.value = modelName;
                // Capitalize the first letter for the UI
                option.textContent = modelName.charAt(0).toUpperCase() + modelName.slice(1);
                modelSelect.appendChild(option);
            });
        }
    } catch (e) {
        console.error("Could not fetch models:", e);
    }
});

document.getElementById("queryInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        performSearch();
    }
});

async function performSearch() {
    const queryInput = document.getElementById('queryInput');
    const yearSelect = document.getElementById('yearSelect');
    const responseBox = document.getElementById('responseBox');
    const searchButton = document.getElementById('searchButton');

    const query = queryInput.value.trim();
    const year = yearSelect.value;
    const selectedModel = document.getElementById('modelSelect').value;

    if (!query) {
        responseBox.innerHTML = '<span class="error">Please enter a question.</span>';
        return;
    }

    searchButton.disabled = true;
    searchButton.textContent = "Searching...";

    responseBox.innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
            <span>Searching papers...</span>
        </div>
    `;

    try {
        const response = await fetch('/api/search', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ query: query, year: year, model: selectedModel })
        });

        const result = await response.json();

        if (response.ok) {
            responseBox.innerHTML = `<div class="fade-in">${result.response || "No response found."}</div>`;
        } else {
            responseBox.innerHTML = `<span class="error">Error:</span> ${result.detail || 'Unknown error'}`;
        }

    } catch (error) {
        responseBox.innerHTML = '<span class="error">Connection error. Backend might not be running.</span>';
    }

    searchButton.disabled = false;
    searchButton.textContent = "Search";
}

async function performArxivFetch() {
    const topicInput = document.getElementById('arxivTopic').value.trim();
    const countInput = document.getElementById('arxivCount').value;
    const fetchButton = document.getElementById('fetchButton');
    const fetchStatus = document.getElementById('fetchStatus');

    if (!topicInput) {
        fetchStatus.innerHTML = '<span class="error">Please enter a topic to fetch.</span>';
        return;
    }

    fetchButton.disabled = true;
    fetchButton.textContent = "Fetching...";
    fetchStatus.innerHTML = `<div class="spinner" style="display:inline-block; width:15px; height:15px; border-width:2px; margin-right:5px;"></div> Pulling from ArXiv...`;

    try {
        const response = await fetch('/api/fetch-arxiv', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topic: topicInput, max_results: parseInt(countInput) })
        });

        const result = await response.json();

        if (response.ok) {
            fetchStatus.innerHTML = `<span style="color: green;">Added ${result.new_papers_added} new research papers.</span>`;
            document.getElementById('arxivTopic').value = ''; // Clear the input
        } else {
            fetchStatus.innerHTML = `<span class="error">Error: ${result.detail}</span>`;
        }
    } catch (error) {
        fetchStatus.innerHTML = '<span class="error">Connection error.</span>';
    }

    fetchButton.disabled = false;
    fetchButton.textContent = "Fetch & Learn";
}
</script>

</body>
</html>
